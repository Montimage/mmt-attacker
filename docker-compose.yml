# ============================================================================
# matcha two-container demo — attacker + target
# ============================================================================
# Usage:
#   docker compose up --build -d          # builds both attacker and target locally
#   docker compose exec attacker matcha syn-flood --target-ip target --target-port 80 --count 200
#   docker compose down
#
# The attacker container is built from the root Dockerfile; the target
# container is built from docker/target/Dockerfile. Both share an isolated
# bridge network so attacks stay contained to this environment.
# ============================================================================

services:

  # --------------------------------------------------------------------------
  # Attacker — matcha CLI image
  # --------------------------------------------------------------------------
  attacker:
    build:
      context: .
      dockerfile: Dockerfile
    # Override the default entrypoint so the container stays alive for
    # exec-style usage (docker compose exec attacker matcha <attack>)
    entrypoint: ["tail", "-f", "/dev/null"]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - lab
    depends_on:
      - target

  # --------------------------------------------------------------------------
  # Target — vulnerable services for attack simulations
  # --------------------------------------------------------------------------
  target:
    build:
      context: docker/target
      dockerfile: Dockerfile
    hostname: target
    networks:
      - lab
    ports:
      # Expose to host only for manual inspection — not required for attacks
      - "8080:80"   # HTTP  (host:8080 → container:80)
      - "2222:22"   # SSH   (host:2222 → container:22)
      - "2121:21"   # FTP   (host:2121 → container:21)

# --------------------------------------------------------------------------
# Isolated bridge network — containers talk to each other but not the host
# --------------------------------------------------------------------------
networks:
  lab:
    driver: bridge
